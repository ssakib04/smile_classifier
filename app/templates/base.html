<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Classifier Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top left, #0f172a, #020617);
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col antialiased">
    <nav class="sticky top-0 z-50 glass border-b border-slate-800/80">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                        <i class="fa-solid font-bold fa-face-smile text-white text-xl"></i>
                    </div>
                    <span class="font-bold text-lg tracking-wide bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Smile AI</span>
                </a>
                <div class="flex space-x-1 sm:space-x-4">
                    <a href="/" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-800 transition"><i class="fa-solid fa-house mr-1.5"></i>Home</a>
                    <a href="/train" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-800 transition"><i class="fa-solid fa-brain mr-1.5"></i>Train</a>
                    <a href="/classify" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-800 transition"><i class="fa-solid fa-wand-magic-sparkles mr-1.5"></i>Classify</a>
                    <a href="/history" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-800 transition"><i class="fa-solid fa-clock-history mr-1.5 font-normal"></i>History</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-slate-800/80 py-6 text-center text-xs text-slate-500">
        Smile AI Studio • Running on FastAPI, Docker & PostgreSQL (BST Logs)
    </footer>
</body>
</html>
