{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto glass p-6 rounded-2xl text-center space-y-6">
    <h2 class="text-2xl font-bold text-white">Classification Result</h2>
    
    <div class="relative w-48 h-48 mx-auto rounded-2xl overflow-hidden border-2 border-indigo-500/50 shadow-xl">
        <img src="{{ image_path }}" class="w-full h-full object-cover">
    </div>

    <div class="space-y-2">
        <div class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
            {{ predicted_class }}
        </div>
        <p class="text-sm text-slate-400">Model Used: <span class="text-slate-200">{{ model_used }}.pkl</span></p>
    </div>

    <div class="glass p-4 rounded-xl space-y-2">
        <div class="flex justify-between text-xs font-semibold text-slate-400">
            <span>Confidence Score</span>
            <span>{{ confidence }}%</span>
        </div>
        <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden">
            <div class="bg-indigo-500 h-full rounded-full" style="width: {{ confidence }}%"></div>
        </div>
    </div>

    <a href="/classify" class="inline-block px-6 py-3 bg-slate-800 hover:bg-slate-700 text-sm font-semibold rounded-xl transition">Classify Another Image</a>
</div>
{% endblock %}
