{% extends "base.html" %}
{% block content %}
<div class="card-dark text-center">
    <h2 class="mb-3">Prediction Result</h2>
    <hr>
    <div class="mb-4">
        <img src="{{ image_path }}" class="img-thumbnail-dark" alt="classified image">
    </div>
    <h3 class="mb-2">Class: <span class="badge-accent">{{ predicted_class }}</span></h3>
    <p class="fs-5 mt-3">Confidence Score: <strong>{{ confidence }}%</strong></p>
    <p class="text-muted-theme">Model Used: {{ model_used }}.pkl</p>
    <a href="/classify" class="btn btn-outline-theme mt-3">Test Another Image</a>
</div>
{% endblock %}
